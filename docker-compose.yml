version: '3.8'

services:
  backend:
    image: node:20-alpine
    container_name: express_ts_backend
    working_dir: /app
    ports:
      - "3001:3001"
    volumes:
      - ./backend:/app
      - /app/node_modules
    environment:
      - PORT=3001
      - MONGODB_URI=mongodb://root:webdev-t-list@host.docker.internal:27017/todo-list?authSource=admin
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: sh -c "npm install && npx tsx watch ./src/index.ts"
    networks:
      - app-net

  frontend:
    image: node:20-alpine
    container_name: react_vite_frontend
    working_dir: /app
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:3001
    command: sh -c "npm install && npm run dev -- --host"
    networks:
      - app-net
    depends_on:
      - backend

networks:
  app-net:
    driver: bridge
